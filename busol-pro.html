<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>БГ-ХНС ПРО — Единый Лесотаксационный Комплекс</title>
    
    <link rel="icon" type="image/jpeg" href="logo.jpeg">
    <script type="text/javascript" src="cordova.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.mini.min.js"></script>

    <script type="text/javascript">
    // --- АВТОНОМНАЯ ЗАЩИТА ЛИЦЕНЗИИ (БГ-ХНС) ---
    (function() {
        const licensedDevices = {
            "HNS-6680-TVK32U": new Date(2026, 6, 25),  
            "HNS-RAL2-45TCN0": new Date(2099, 11, 31), 
            "HNS-3SBX-TQMJO7": new Date(2026, 11, 31), 
            "HNS-5V40-G89K6X": new Date(2026, 6, 25),  
            "HNS-6BS0-ZIHISC": new Date(2026, 6, 25)   
        };

        const defaultLicenseExpirationDate = new Date(2026, 6, 21); 

        function generateWebDeviceId() {
            const chars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            let s1 = '', s2 = '';
            for (let i = 0; i < 4; i++) s1 += chars.charAt(Math.floor(Math.random() * chars.length));
            for (let i = 0; i < 6; i++) s2 += chars.charAt(Math.floor(Math.random() * chars.length));
            return `HNS-${s1}-${s2}`;
        }

        function getCurrentDeviceId() {
            if (window.device && window.device.uuid) return window.device.uuid;
            let webId = localStorage.getItem('bg_hns_web_id');
            if (!webId) {
                webId = generateWebDeviceId();
                localStorage.setItem('bg_hns_web_id', webId);
            }
            return webId;
        }

        function runLicenseCheck() {
            const currentId = getCurrentDeviceId();
            const now = Date.now();
            let isBlocked = false;

            if (licensedDevices.hasOwnProperty(currentId)) {
                if (now > licensedDevices[currentId].getTime()) isBlocked = true;
            } else {
                if (now > defaultLicenseExpirationDate.getTime()) isBlocked = true;
            }

            if (isBlocked) {
                document.body.innerHTML = `
                    <div style="position:fixed; top:0; left:0; width:100vw; height:100vh; background:#1A2421; color:#F9FBF9; z-index:999999; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:'Inter',sans-serif; padding:20px; text-align:center;">
                        <span style="font-size:50px; margin-bottom:20px;">🔒</span>
                        <h2 style="font-family:'Merriweather',serif; color:#8FBC8F; margin-bottom:10px;">Срок действия лицензии «БГ-ХНС ПРО» истек</h2>
                        <p style="max-width:480px; font-size:14px; opacity:0.8; line-height:1.6;">
                            Доступ заблокирован.<br>ID устройства: <b>${currentId}</b>
                        </p>
                        <a href="mailto:foltaim@mail.ru" style="color:#8FBC8F; font-weight:bold; margin-top:15px; text-decoration:none;">✉️ foltaim@mail.ru</a>
                    </div>
                `;
            }
        }

        document.addEventListener('deviceready', runLicenseCheck, false);
        document.addEventListener('DOMContentLoaded', () => { setTimeout(() => { if (!window.device) runLicenseCheck(); }, 400); }, false);
    })();
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg-paper: #F9FBF9;
            --text-graphite: #333333;
            --forest-green: #2D5A27;
            --forest-light: #8FBC8F;
            --border-color: #E0E0E0;
            --card-bg: #FFFFFF;
            --glass-bg: rgba(249, 251, 249, 0.85);
            --danger-color: #DC2626;
            --success-color: #16A34A;
            --info-color: #2563EB;
        }

        [data-theme="dark"] {
            --bg-paper: #1A2421;
            --text-graphite: #F9FBF9;
            --forest-green: #8FBC8F;
            --forest-light: #2D5A27;
            --border-color: #3A4F46;
            --card-bg: #22302B;
            --glass-bg: rgba(26, 36, 33, 0.85);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-paper);
            color: var(--text-graphite);
            margin: 0; padding: 0;
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
            display: flex; flex-direction: column;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        /* ЕДИНАЯ ШАПКА BGS-STYLE */
        .glass-header {
            position: sticky; top: 0; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 20px; background: var(--glass-bg);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
        }
        .logo-container { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .header-logo { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 2px solid var(--forest-green); }
        .glass-header h1 { font-family: 'Merriweather', serif; color: var(--forest-green); margin: 0; font-size: 18px; }

        .header-controls { display: flex; align-items: center; gap: 10px; }
        
        .tandem-badge {
            display: flex; align-items: center; gap: 6px;
            background: rgba(45, 90, 39, 0.08); border: 1px solid var(--forest-green);
            padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; color: var(--forest-green);
        }
        .tandem-badge input { accent-color: var(--forest-green); cursor: pointer; }

        .btn-theme {
            background: transparent; border: 1px solid var(--forest-green);
            color: var(--forest-green); padding: 6px 12px; border-radius: 8px;
            cursor: pointer; font-size: 12px; font-weight: 600; transition: 0.2s;
        }
        .btn-theme:hover { background: var(--forest-green); color: var(--bg-paper); }

        /* КОНТЕЙНЕР И КАРТОЧКИ */
        .container { max-width: 900px; margin: 20px auto 80px; padding: 0 15px; width: 100%; box-sizing: border-box; }
        
        .card {
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 20px; margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }
        .card h2 { font-family: 'Merriweather', serif; color: var(--forest-green); margin-top: 0; font-size: 20px; margin-bottom: 15px; }

        .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
        .form-group label { font-size: 11px; font-weight: 700; uppercase; color: var(--forest-green); letter-spacing: 0.5px; }
        
        .input-control, select {
            width: 100%; padding: 12px; border: 1px solid var(--border-color);
            border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 15px;
            background-color: var(--bg-paper); color: var(--text-graphite); box-sizing: border-box;
        }

        .btn-main {
            background-color: var(--forest-green); color: #FFF; border: none;
            padding: 14px; width: 100%; border-radius: 8px; cursor: pointer;
            font-weight: 600; text-transform: uppercase; font-size: 14px; letter-spacing: 0.5px;
            text-align: center; transition: 0.2s; box-sizing: border-box;
        }
        .btn-main:hover { opacity: 0.9; }

        /* ИНТЕРФЕЙС КАМЕРЫ И БУССОЛИ */
        .viewport-wrapper {
            position: relative; width: 100%; aspect-ratio: 3/4; background: #000;
            border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color); margin-bottom: 15px;
        }
        .viewport-wrapper video { width: 100%; height: 100%; object-fit: cover; }
        
        .reticle-v { position: absolute; top: 0; left: 50%; width: 2px; height: 100%; background: rgba(255,255,255,0.4); transform: translateX(-50%); pointer-events: none; }
        .reticle-h { position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: rgba(255,255,255,0.4); transform: translateY(-50%); pointer-events: none; }

        /* ТАБ БАР В СТИЛЕ БУССОЛИ */
        .spa-tab-bar {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
            background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid var(--border-color); display: flex; justify-content: space-around;
            padding: 8px 0 env(safe-area-inset-bottom, 8px);
        }
        .tab-item {
            background: transparent; border: none; color: var(--text-graphite); opacity: 0.6;
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            font-size: 10px; font-weight: 600; cursor: pointer; padding: 2px 6px; transition: 0.2s;
        }
        .tab-item.active { color: var(--forest-green); opacity: 1; font-weight: 700; }
        .tab-item .icon { font-size: 18px; }

        .module-block { display: none; }
        .module-block.active { display: block; }
    </style>
</head>
<body>

    <header class="glass-header">
        <a href="#" class="logo-container" onclick="return false;">
            <img src="logo.jpeg" alt="БГ-ХНС" class="header-logo" onerror="this.style.display='none'">
            <h1>БГ-ХНС ПРО</h1>
        </a>
        <div class="header-controls">
            <div class="tandem-badge">
                <input type="checkbox" id="tandem-switch" checked onchange="toggleTandem(this.checked)">
                <label for="tandem-switch">ТАНДЕМ</label>
            </div>
            <button class="btn-theme" onclick="toggleTheme()">Тема</button>
        </div>
    </header>

    <main class="container">

        <!-- МОДУЛЬ 1: БУССОЛЬ -->
        <section id="sec-busol" class="module-block active">
            <div class="card">
                <h2>🧭 Электронная буссоль БГ-ХНС</h2>
                
                <div class="form-group">
                    <label>Название делянки / объекта</label>
                    <input type="text" id="busol-title" class="input-control" value="Сыктывкарское уч-во, кв. 82, выд. 4" oninput="updateProjectTitle(this.value)">
                </div>

                <div class="viewport-wrapper">
                    <video id="cam-busol" autoplay playsinline muted></video>
                    <div class="reticle-v"></div>
                    <div class="reticle-h"></div>
                    <div style="position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.65); color: #FFF; padding: 6px 12px; border-radius: 6px; font-family: monospace; font-size: 13px;">
                        Азимут: <b id="val-azimuth" style="color:var(--forest-light);">0.0°</b> | Румб: <b id="val-rumb">СВ 0.0°</b>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px;">
                    <button class="btn-main" style="background: var(--info-color);" onclick="recordStationPoint()">📌 Засечь точку</button>
                    <button class="btn-main" style="background: var(--danger-color);" onclick="resetBusolTrack()">❌ Сбросить ход</button>
                </div>

                <canvas id="busol-plot" width="400" height="280" style="width: 100%; border: 1px dashed var(--border-color); border-radius: 8px; background: var(--bg-paper);"></canvas>
                <div id="busol-area-output" style="text-align: right; font-weight: 700; color: var(--forest-green); margin-top: 10px; font-size: 15px;">
                    ПЛОЩАДЬ ВЫДЕЛА: 0.0000 га
                </div>
            </div>
        </section>

        <!-- МОДУЛЬ 2: ПЕРЕЧЕТНАЯ ВЕДОМОСТЬ -->
        <section id="sec-tally" class="module-block">
            <div class="card">
                <h2>📋 Перечетная ведомость и точковка</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
                    <div class="form-group">
                        <label>Порода</label>
                        <select id="tally-sp-select" onchange="renderTallyMatrix()">
                            <option value="Сосна">Сосна (С)</option>
                            <option value="Ель">Ель (Е)</option>
                            <option value="Береза">Береза (Б)</option>
                            <option value="Осина">Осина (Ос)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Категория качества</label>
                        <select id="tally-cat-select">
                            <option value="delo">Деловые</option>
                            <option value="half">Полуделовые</option>
                            <option value="fire">Дрова</option>
                        </select>
                    </div>
                </div>

                <div id="tally-grid-matrix" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px;"></div>
            </div>
        </section>

    </main>

    <nav class="spa-tab-bar">
        <button class="tab-item active" onclick="openModule('sec-busol', this)"><span class="icon">🧭</span><span>Буссоль</span></button>
        <button class="tab-item" onclick="openModule('sec-tally', this)"><span class="icon">📋</span><span>Перечет</span></button>
    </nav>

    <script>
        // --- ГЛОБАЛЬНЫЙ РЕЕСТР ДАННЫХ ЛЕСОВИК ПРО ---
        let appData = JSON.parse(localStorage.getItem('lesovik_pro_master_v1')) || {
            tandem: true,
            title: "Сыктывкарское уч-во, кв. 82, выд. 4",
            busolPoints: [],
            areaHa: 0.0,
            tally: {}
        };

        function saveMasterData() {
            localStorage.setItem('lesovik_pro_master_v1', JSON.stringify(appData));
        }

        function toggleTandem(val) {
            appData.tandem = val;
            saveMasterData();
        }

        function toggleTheme() {
            const body = document.documentElement;
            if (body.getAttribute('data-theme') === 'dark') body.removeAttribute('data-theme');
            else body.setAttribute('data-theme', 'dark');
        }

        function openModule(secId, btn) {
            document.querySelectorAll('.module-block').forEach(m => m.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById(secId).classList.add('active');
            btn.classList.add('active');
            if (secId === 'sec-busol') startCamera('cam-busol');
        }

        function updateProjectTitle(v) {
            appData.title = v;
            saveMasterData();
        }

        // РАБОТА С КАМЕРОЙ И ДАТЧИКАМИ
        let streamObj = null;
        async function startCamera(camId) {
            if (streamObj) streamObj.getTracks().forEach(t => t.stop());
            try {
                streamObj = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                document.getElementById(camId).srcObject = streamObj;
            } catch(e) {}
        }

        let heading = 0;
        window.addEventListener('deviceorientation', (e) => {
            if (e.alpha !== null) {
                heading = e.alpha;
                document.getElementById('val-azimuth').innerText = heading.toFixed(1) + '°';
            }
        });

        // БУССОЛЬ - РЕАЛЬНАЯ МАТЕМАТИКА
        function recordStationPoint() {
            let dist = parseFloat(prompt("Расстояние до следующего столба (метры):", "40"));
            if (dist > 0) {
                appData.busolPoints.push({ az: heading, dist: dist });
                redrawPoly();
                saveMasterData();
            }
        }

        function resetBusolTrack() {
            if (confirm("Очистить все точки хода?")) {
                appData.busolPoints = [];
                redrawPoly();
                saveMasterData();
            }
        }

        function redrawPoly() {
            const cvs = document.getElementById('busol-plot');
            const ctx = cvs.getContext('2d');
            ctx.clearRect(0,0,cvs.width,cvs.height);

            if (appData.busolPoints.length === 0) {
                document.getElementById('busol-area-output').innerText = "ПЛОЩАДЬ ВЫДЕЛА: 0.0000 га";
                return;
            }

            let x = cvs.width/2, y = cvs.height/2;
            let path = [{x, y}];

            ctx.beginPath();
            ctx.moveTo(x,y);
            ctx.strokeStyle = '#2D5A27';
            ctx.lineWidth = 2;

            appData.busolPoints.forEach(p => {
                let rad = (p.az - 90) * (Math.PI / 180);
                x += Math.cos(rad) * (p.dist * 0.8);
                y += Math.sin(rad) * (p.dist * 0.8);
                path.push({x, y});
                ctx.lineTo(x, y);
            });
            ctx.closePath();
            ctx.stroke();

            // Формула Гаусса для площади
            let areaSum = 0;
            for (let i = 0; i < path.length; i++) {
                let j = (i + 1) % path.length;
                areaSum += path[i].x * path[j].y - path[j].x * path[i].y;
            }
            let areaHa = Math.abs(areaSum / 2) / 10000;
            appData.areaHa = parseFloat(areaHa.toFixed(4));
            document.getElementById('busol-area-output').innerText = `ПЛОЩАДЬ ВЫДЕЛА: ${appData.areaHa} га`;
        }

        // ПЕРЕЧЕТ
        function renderTallyMatrix() {
            const sp = document.getElementById('tally-sp-select').value;
            const box = document.getElementById('tally-grid-matrix');
            box.innerHTML = '';
            [16, 20, 24, 28, 32, 36, 40].forEach(d => {
                let val = (appData.tally[sp] && appData.tally[sp][d]) ? appData.tally[sp][d] : 0;
                box.innerHTML += `
                    <div style="background:var(--card-bg); border:1px solid var(--border-color); padding:10px; border-radius:8px; text-align:center;">
                        <b style="font-size:12px; color:var(--forest-green);">${d} см</b>
                        <div style="font-size:20px; font-weight:700; margin:4px 0;">${val}</div>
                        <button class="btn-main" style="padding:4px;" onclick="addTree('${sp}', ${d})">+1</button>
                    </div>
                `;
            });
        }

        function addTree(sp, d) {
            if (!appData.tally[sp]) appData.tally[sp] = {};
            appData.tally[sp][d] = (appData.tally[sp][d] || 0) + 1;
            renderTallyMatrix();
            saveMasterData();
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderTallyMatrix();
            startCamera('cam-busol');
        });
    </script>
</body>
</html>
