<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лесовик | Цифровой инструмент таксатора</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌲</text></svg>">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Inter:wght@400;500;600&display=swap');

        /* ПЕРЕМЕННЫЕ */
        :root {
            --bg-paper: #F9FBF9;
            --text-graphite: #333333;
            --forest-green: #2D5A27;
            --forest-light: #8FBC8F;
            --border-color: #E0E0E0;
            --card-bg: #FFFFFF;
            --glass-bg: rgba(249, 251, 249, 0.85);
            --footer-bg: #2C3531;
        }

        /* ТЕМНАЯ ТЕМА */
        [data-theme="dark"] {
            --bg-paper: #1A2421;
            --text-graphite: #F9FBF9;
            --forest-green: #8FBC8F;
            --forest-light: #2D5A27;
            --border-color: #3A4F46;
            --card-bg: #22302B;
            --glass-bg: rgba(26, 36, 33, 0.85);
            --footer-bg: #111815;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-paper);
            color: var(--text-graphite);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Индикатор прогресса чтения */
        #reading-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            background-color: var(--forest-green);
            width: 0%;
            z-index: 10001;
            transition: width 0.1s ease-out;
        }

        /* СТЕКЛЯННАЯ ШАПКА */
        .glass-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            transition: background 0.3s, border-color 0.3s;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-svg {
            width: 28px;
            height: 28px;
            fill: var(--forest-green);
        }

        .glass-header h1 {
            font-family: 'Merriweather', serif;
            color: var(--forest-green);
            margin: 0;
            font-size: 22px;
        }

        .theme-toggle {
            background: transparent;
            border: 1px solid var(--forest-green);
            color: var(--forest-green);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            background-color: var(--forest-green);
            color: var(--bg-paper);
        }

        main {
            flex: 1; /* Растягивает main, чтобы footer всегда был внизу */
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h2.section-title {
            font-family: 'Merriweather', serif;
            color: var(--forest-green);
            font-size: 24px;
            border-bottom: 2px solid var(--forest-green);
            padding-bottom: 10px;
            margin-bottom: 30px;
            display: inline-block;
        }

        /* БЕНТО СЕТКА */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 60px;
        }

        .bento-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .bento-card:hover {
            box-shadow: 4px 4px 15px rgba(0,0,0,0.05);
            border-color: var(--forest-green);
        }

        .bento-card h3 {
            margin-top: 0;
            font-family: 'Merriweather', serif;
            color: var(--forest-green);
            font-size: 18px;
        }

        /* Формы калькуляторов */
        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block; font-size: 12px; font-weight: 600;
            margin-bottom: 5px; text-transform: uppercase; color: var(--forest-green);
        }
        .form-group input, .form-group select {
            width: 100%; padding: 12px; border: 1px solid var(--border-color);
            border-radius: 8px; box-sizing: border-box;
            background-color: var(--bg-paper); color: var(--text-graphite);
            font-family: 'Inter', sans-serif;
        }

        .btn-calc {
            background-color: var(--forest-green); color: #fff;
            border: none; padding: 14px; width: 100%; border-radius: 8px;
            cursor: pointer; font-weight: 600; text-transform: uppercase; transition: 0.2s;
        }
        .btn-calc:hover { background-color: var(--text-graphite); }

        .calc-result {
            margin-top: 15px; padding: 15px; background-color: var(--bg-paper);
            border: 1px dashed var(--forest-green); border-radius: 8px;
            font-weight: 600; text-align: center; display: none; color: var(--text-graphite);
        }

        /* КАРТОЧКИ СТАТЕЙ (С ФОТО) */
        .article-card {
            display: flex; flex-direction: column; cursor: pointer;
            overflow: hidden; text-decoration: none;
        }
        
        .article-img {
            width: 100%; height: 180px; object-fit: cover;
            border-radius: 8px; background-color: var(--border-color); margin-bottom: 15px;
        }

        /* --- СТРАНИЦА ОДНОЙ СТАТЬИ --- */
        #article-view {
            display: none; /* Скрыто по умолчанию */
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px;
            margin-bottom: 40px;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: transparent;
            color: var(--forest-green);
            border: 1px solid var(--forest-green);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 20px;
            text-decoration: none;
            transition: 0.2s;
        }

        .btn-back:hover {
            background: var(--forest-green);
            color: var(--bg-paper);
        }

        .full-article-title {
            font-family: 'Merriweather', serif;
            font-size: 32px;
            color: var(--forest-green);
            margin-top: 0;
            margin-bottom: 20px;
        }

        .full-article-cover {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .full-article-content {
            font-size: 16px;
            line-height: 1.8;
        }

        /* ПОДВАЛ (Footer) */
        footer {
            background-color: var(--footer-bg);
            color: #E0E0E0;
            text-align: center;
            padding: 30px 20px;
            margin-top: auto;
        }

        .footer-logo {
            fill: #E0E0E0;
            width: 24px;
            height: 24px;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .glass-header { padding: 15px 20px; }
            #article-view { padding: 20px; }
            .full-article-title { font-size: 24px; }
        }
    </style>
</head>
<body>

    <!-- Веточка (Индикатор прогресса) -->
    <div id="reading-progress"></div>

    <!-- Стеклянная шапка -->
    <header class="glass-header">
        <a href="index.html" class="logo-container" id="logo-link">
            <svg class="logo-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L1 21H23L12 2ZM12 6.88L18.17 17.5H5.83L12 6.88Z"/>
                <rect x="10.5" y="20" width="3" height="4"/>
            </svg>
            <h1>Лесовик</h1>
        </a>
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">Тень 🌙</button>
    </header>

    <main class="container">
        
        <!-- ================= ГЛАВНАЯ СТРАНИЦА ================= -->
        <div id="home-view">
            <!-- СЕКЦИЯ: КАЛЬКУЛЯТОРЫ -->
            <h2 class="section-title">Цифровой Инструментарий</h2>
            <div class="bento-grid">
                
                <!-- Калькулятор Кубатуры -->
                <div class="bento-card">
                    <h3>📏 Объем круглого леса</h3>
                    <div class="form-group">
                        <label>Диаметр в верхнем отрубе без коры (см)</label>
                        <input type="number" id="cub-d" placeholder="Например: 24">
                    </div>
                    <div class="form-group">
                        <label>Длина бревна/хлыста (м)</label>
                        <input type="number" id="cub-l" placeholder="Например: 6">
                    </div>
                    <div class="form-group">
                        <label>Количество (шт)</label>
                        <input type="number" id="cub-q" value="1" placeholder="Сколько таких бревен?">
                    </div>
                    <button class="btn-calc" onclick="calcCubature()">Рассчитать объем</button>
                    <div id="cub-result" class="calc-result"></div>
                </div>

                <!-- Калькулятор Веса -->
                <div class="bento-card">
                    <h3>⚖️ Оценка веса древесины</h3>
                    <div class="form-group">
                        <label>Порода (свежесрубленная)</label>
                        <select id="weight-species">
                            <optgroup label="Хвойные">
                                <option value="800">Сосна (~800 кг/м³)</option>
                                <option value="750">Ель (~750 кг/м³)</option>
                                <option value="850">Лиственница (~850 кг/м³)</option>
                                <option value="800">Кедр (~800 кг/м³)</option>
                                <option value="750">Пихта (~750 кг/м³)</option>
                            </optgroup>
                            <optgroup label="Лиственные">
                                <option value="850">Береза (~850 кг/м³)</option>
                                <option value="800">Осина (~800 кг/м³)</option>
                                <option value="1000">Дуб (~1000 кг/м³)</option>
                                <option value="950">Бук (~950 кг/м³)</option>
                                <option value="900">Ясень (~900 кг/м³)</option>
                                <option value="750">Липа (~750 кг/м³)</option>
                                <option value="800">Ольха (~800 кг/м³)</option>
                            </optgroup>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Общий объем (м³)</label>
                        <input type="number" id="weight-v" placeholder="Например: 20">
                    </div>
                    <button class="btn-calc" onclick="calcWeight()">Узнать вес груза</button>
                    <div id="weight-result" class="calc-result"></div>
                </div>

                <!-- Калькулятор Полноты -->
                <div class="bento-card">
                    <h3>🌳 Полнота насаждений</h3>
                    <div class="form-group">
                        <label>Количество стволов (шт)</label>
                        <input type="number" id="pol-n" placeholder="По перечету">
                    </div>
                    <div class="form-group">
                        <label>Средний диаметр (см)</label>
                        <input type="number" id="pol-d" placeholder="Например: 32">
                    </div>
                    <button class="btn-calc" onclick="calcPolnota()">Площадь сечений (м²/га)</button>
                    <div id="pol-result" class="calc-result"></div>
                </div>

            </div>

            <!-- СЕКЦИЯ: БАЗА ЗНАНИЙ (Статьи) -->
            <h2 class="section-title">Опыт и Практика</h2>
            <div id="articles-container" class="bento-grid">
                <p style="color: var(--forest-green);">⏳ Подключаемся к базе Лесовика...</p>
            </div>
        </div>

        <!-- ================= СТРАНИЦА ОДНОЙ СТАТЬИ ================= -->
        <div id="article-view">
            <button class="btn-back" onclick="goHome()">← Назад к материалам</button>
            <h1 id="full-title" class="full-article-title">Загрузка...</h1>
            <img id="full-cover" class="full-article-cover" src="" alt="Обложка" style="display: none;">
            <div id="full-content" class="full-article-content">
                ⏳ Пожалуйста, подождите...
            </div>
        </div>

    </main>

    <!-- ПОДВАЛ -->
    <footer>
        <svg class="footer-logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L1 21H23L12 2ZM12 6.88L18.17 17.5H5.83L12 6.88Z"/>
            <rect x="10.5" y="20" width="3" height="4"/>
        </svg>
        <div style="font-weight: 600; font-family: 'Merriweather', serif; font-size: 18px; margin-bottom: 10px;">Лесовик</div>
        <div>&copy; <script>document.write(new Date().getFullYear())</script> Создано для профессионалов леса.</div>
        <div style="font-size: 11px; margin-top: 10px; opacity: 0.6;">Все расчеты калькуляторов носят справочный характер.</div>
    </footer>

    <script>
        // --- ПЕРЕКЛЮЧЕНИЕ ТЕМЫ (СВЕТ/ТЕНЬ) ---
        function toggleTheme() {
            const body = document.documentElement;
            const btn = document.getElementById('themeBtn');
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                btn.innerHTML = 'Тень 🌙';
            } else {
                body.setAttribute('data-theme', 'dark');
                btn.innerHTML = 'Свет ☀️';
            }
        }

        // --- ИНДИКАТОР ПРОГРЕССА ---
        window.addEventListener('scroll', () => {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById("reading-progress").style.width = scrolled + "%";
        });

        // --- КАЛЬКУЛЯТОРЫ ---
        function calcCubature() {
            const d = parseFloat(document.getElementById('cub-d').value);
            const l = parseFloat(document.getElementById('cub-l').value);
            const q = parseFloat(document.getElementById('cub-q').value) || 1; 
            const resBox = document.getElementById('cub-result');
            
            if(d > 0 && l > 0 && q > 0) {
                const v_single = ((Math.PI * Math.pow(d, 2)) / 40000) * l;
                const v_total = v_single * q;
                resBox.style.display = 'block';
                resBox.innerHTML = `Объем ${q} шт: <b>${v_total.toFixed(3)} м³</b><br><small style="font-size:10px; color:gray;">*Геометрический расчет. Сверяйте с ГОСТ 2708-75</small>`;
            } else {
                alert("Введите корректный диаметр, длину и количество.");
            }
        }

        function calcWeight() {
            const density = parseFloat(document.getElementById('weight-species').value);
            const v = parseFloat(document.getElementById('weight-v').value);
            const resBox = document.getElementById('weight-result');
            if(v > 0) {
                const weightKg = density * v; 
                resBox.style.display = 'block';
                resBox.innerHTML = `Масса груза: <b>${(weightKg / 1000).toFixed(2)} тонн</b>`;
            } else {
                alert("Введите корректный объем.");
            }
        }

        function calcPolnota() {
            const n = parseFloat(document.getElementById('pol-n').value);
            const d = parseFloat(document.getElementById('pol-d').value);
            const resBox = document.getElementById('pol-result');
            if(n > 0 && d > 0) {
                const g = n * ((Math.PI * Math.pow(d, 2)) / 40000);
                resBox.style.display = 'block';
                resBox.innerHTML = `Сумма сечений: <b>${g.toFixed(2)} м²/га</b>`;
            } else {
                alert("Введите корректные данные.");
            }
        }

        // --- РОУТИНГ И РАБОТА С БАЗОЙ (SPA) ---
        const API_URL = 'https://functions.yandexcloud.net/d4ecn5ag33dcdd2deivd';
        let articlesData = [];

        // Проверяем адресную строку. Если есть ?id=..., показываем статью. Иначе - главную.
        async function initApp() {
            const urlParams = new URLSearchParams(window.location.search);
            const articleId = urlParams.get('id');

            await fetchArticlesData(); // Сначала загружаем данные из базы

            if (articleId) {
                renderArticleView(articleId);
            } else {
                renderHomeView();
            }
        }

        async function fetchArticlesData() {
            try {
                const response = await fetch(API_URL + '?action=list');
                const data = await response.json();
                if (data.articles) {
                    articlesData = data.articles.reverse(); // Новые сверху
                }
            } catch (error) {
                console.error('Ошибка загрузки данных', error);
            }
        }

        function renderHomeView() {
            document.getElementById('article-view').style.display = 'none';
            document.getElementById('home-view').style.display = 'block';
            
            const container = document.getElementById('articles-container');
            
            if (articlesData.length > 0) {
                container.innerHTML = '';
                articlesData.forEach(article => {
                    const imgUrl = article.cover_image_url ? article.cover_image_url : 'https://placehold.co/600x400/2D5A27/FFF?text=Фото+в+пути';
                    // Формируем правильную ссылку для SEO и шеринга: ?id=...
                    container.innerHTML += `
                        <a href="?id=${article.id}" class="bento-card article-card">
                            <img src="${imgUrl}" alt="Обложка" class="article-img">
                            <h3>${article.title}</h3>
                        </a>
                    `;
                });
            } else {
                container.innerHTML = '<p>Архив пока пуст. Ожидайте новых публикаций!</p>';
            }
        }

        function renderArticleView(id) {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('article-view').style.display = 'block';
            window.scrollTo(0, 0); // Прокручиваем наверх

            const article = articlesData.find(a => a.id === id);
            
            if(article) {
                document.getElementById('full-title').innerText = article.title;
                
                // Настраиваем обложку
                const coverImg = document.getElementById('full-cover');
                if (article.cover_image_url) {
                    coverImg.src = article.cover_image_url;
                    coverImg.style.display = 'block';
                } else {
                    coverImg.style.display = 'none';
                }

                // Вставляем текст и видео (если есть)
                let finalContent = "";
                if (article.rutube_iframe) {
                    finalContent += `<div style="margin-bottom: 20px;">${article.rutube_iframe}</div>`;
                }
                
                if (article.content) {
                    finalContent += article.content;
                } else {
                    finalContent += `<p><i>Текст статьи скоро появится. Обновите бэкенд для загрузки полного контента.</i></p>`;
                }
                
                document.getElementById('full-content').innerHTML = finalContent;
            } else {
                document.getElementById('full-title').innerText = "Статья не найдена";
                document.getElementById('full-content').innerHTML = "<p>Возможно, материал был удален или ссылка устарела.</p>";
            }
        }

        // Кнопка "Назад"
        function goHome() {
            // Меняем URL обратно на чистый, без перезагрузки страницы
            window.history.pushState({}, document.title, window.location.pathname);
            renderHomeView();
        }

        // Запуск приложения
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
