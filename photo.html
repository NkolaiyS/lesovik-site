<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лесовик — Юридическая фотофиксация</title>
    <link rel="icon" type="image/jpeg" href="logo.jpeg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Inter:wght@400;500;600&display=swap');

        :root {
            --bg-paper: #F9FBF9;
            --text-graphite: #333333;
            --forest-green: #2D5A27;
            --forest-light: #8FBC8F;
            --border-color: #E0E0E0;
            --card-bg: #FFFFFF;
            --danger-color: #DC2626;
        }

        [data-theme="dark"] {
            --bg-paper: #1A2421;
            --text-graphite: #F9FBF9;
            --forest-green: #8FBC8F;
            --forest-light: #2D5A27;
            --border-color: #3A4F46;
            --card-bg: #22302B;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-paper);
            color: var(--text-graphite);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px; 
            box-sizing: border-box;
            padding: 40px 20px;
        }

        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--forest-green);
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        h1 {
            font-family: 'Merriweather', serif;
            color: var(--forest-green);
            font-size: 28px;
            margin: 0;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: transparent;
            color: var(--forest-green);
            border: 1px solid var(--forest-green);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            transition: 0.2s;
            font-size: 15px;
        }

        .btn-back:hover {
            background: var(--forest-green);
            color: var(--bg-paper);
        }

        .photo-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .instruction-text {
            font-size: 14px;
            opacity: 0.8;
            margin: 0;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--forest-green);
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            background-color: var(--bg-paper);
            color: var(--text-graphite);
            font-family: 'Inter', sans-serif;
            font-size: 16px;
        }

        input[type="file"] { display: none; }

        .btn-main {
            background-color: var(--forest-green);
            color: #fff;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            text-transform: uppercase; 
            transition: 0.2s;
            font-size: 16px;
            letter-spacing: 0.5px;
            text-align: center;
            display: block;
            box-sizing: border-box;
            text-decoration: none;
        }

        .btn-main:hover {
            background-color: var(--text-graphite);
        }

        .btn-camera {
            background-color: transparent;
            border: 2px dashed var(--forest-green);
            color: var(--forest-green);
        }
        
        .btn-camera:hover {
            background-color: rgba(143, 188, 143, 0.15);
        }

        .btn-cancel {
            background-color: #FEE2E2;
            color: var(--danger-color);
            border: 1px solid #F87171;
            padding: 14px;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            text-transform: uppercase;
            transition: 0.2s;
            font-size: 14px;
            text-align: center;
            display: none;
            box-sizing: border-box;
            margin-top: 10px;
        }

        .btn-cancel:hover {
            background-color: var(--danger-color);
            color: #fff;
        }

        #status-message {
            padding: 15px;
            background-color: var(--bg-paper);
            border: 1px dashed var(--forest-green);
            border-radius: 8px;
            font-weight: 600;
            text-align: center;
            display: none;
        }

        #watermark-canvas {
            max-width: 100%;
            display: none;
            border-radius: 8px;
            margin: 10px auto 0 auto;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        @media (max-width: 600px) {
            .container { padding: 20px 15px; }
            h1 { font-size: 22px; }
            .header-area { flex-direction: column; align-items: flex-start; gap: 15px; }
            .btn-back { width: 100%; text-align: center; justify-content: center; box-sizing: border-box; }
            .photo-card { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="header-area">
            <h1>📸 Юридическая фотофиксация</h1>
            <a href="index.html" class="btn-back">← На главную</a>
        </div>

        <div class="photo-card">
            <p class="instruction-text">
                Инструмент фиксации доказательств для актов проверки. Координаты, время и номер объекта впекаются напрямую в пиксели фотографии.
            </p>

            <div class="form-group">
                <label>Примечание / Номер объекта (появится на штампе фото)</label>
                <input type="text" id="photo-note" placeholder="Например: Делянка 4, выдел 12">
            </div>

            <div class="form-group">
                <label>Шаг 1: Получить снимок</label>
                <label for="fullscreen-file-input" class="btn-main btn-camera" id="upload-label">🌲 Включить камеру телефона</label>
                <input type="file" id="fullscreen-file-input" accept="image/*" capture="environment" onchange="processPhoto(event)">
            </div>

            <div id="status-message"></div>

            <canvas id="watermark-canvas"></canvas>

            <a id="download-btn" class="btn-main" style="display: none;">💾 Сохранить фото со штампом в галерею</a>
            <button id="reset-btn" class="btn-cancel" onclick="resetPhotoModule()">❌ Сбросить и сделать новое фото</button>
        </div>

    </div>

    <script>
        // Перехватчик любых критических ошибок для диагностики
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            alert("Критическая ошибка Safari: " + msg + "\nСтрока: " + lineNo);
            resetPhotoModule();
            return false;
        };

        // Логика получения GPS
        function getGPS() {
            return new Promise((resolve) => {
                let responded = false;
                
                // Таймер отсечки: если спутников нет через 4.5 секунды - идем дальше без них
                const fallback = setTimeout(() => {
                    if (!responded) {
                        responded = true;
                        resolve({ lat: 'Нет сигнала', lon: 'Нет сигнала' });
                    }
                }, 4500);

                if (!navigator.geolocation) {
                    clearTimeout(fallback);
                    resolve({ lat: 'Нет сигнала', lon: 'Нет сигнала' });
                    return;
                }

                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        if (!responded) {
                            responded = true;
                            clearTimeout(fallback);
                            resolve({
                                lat: pos.coords.latitude.toFixed(6),
                                lon: pos.coords.longitude.toFixed(6)
                            });
                        }
                    },
                    (err) => {
                        if (!responded) {
                            responded = true;
                            clearTimeout(fallback);
                            resolve({ lat: 'Нет сигнала', lon: 'Нет сигнала' });
                        }
                    },
                    { enableHighAccuracy: true, timeout: 4000, maximumAge: 0 }
                );
            });
        }

        // Логика чтения файла
        function readImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => resolve(img);
                    img.onerror = () => reject(new Error("Айфон не смог декодировать изображение"));
                    img.src = e.target.result;
                };
                reader.onerror = () => reject(new Error("Ошибка чтения файла из памяти"));
                reader.readAsDataURL(file);
            });
        }

        // Главная функция обработки
        async function processPhoto(event) {
            const file = event.target.files[0];
            if (!file) return; // Если нажали "Отмена" в камере

            const statusMessage = document.getElementById('status-message');
            const canvas = document.getElementById('watermark-canvas');
            const downloadBtn = document.getElementById('download-btn');
            const resetBtn = document.getElementById('reset-btn');
            const noteInput = document.getElementById('photo-note').value.trim();

            try {
                // Подготовка интерфейса
                statusMessage.style.display = 'block';
                statusMessage.innerText = '⏳ Чтение фото и поиск спутников...';
                canvas.style.display = 'none';
                downloadBtn.style.display = 'none';
                resetBtn.style.display = 'none';

                // Запускаем поиск GPS и чтение фото ОДНОВРЕМЕННО
                const [gps, img] = await Promise.all([getGPS(), readImage(file)]);

                statusMessage.innerText = '⏳ Наложение штампов...';

                // Сжатие фото для предотвращения вылета Safari (Canvas Memory Limit)
                const MAX_WIDTH = 1200; 
                let width = img.width;
                let height = img.height;

                if (width > MAX_WIDTH) {
                    height = Math.round((height * MAX_WIDTH) / width);
                    width = MAX_WIDTH;
                }

                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                
                // Отрисовка фото
                ctx.drawImage(img, 0, 0, width, height);

                // Расчет размеров шрифта
                const fontSize = Math.max(16, Math.round(canvas.width * 0.024));
                const padding = fontSize;
                const linesCount = noteInput !== "" ? 3.8 : 2.8;

                // Черный фон штампа
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, canvas.height - (fontSize * linesCount + padding), canvas.width, fontSize * linesCount + padding);

                // Заголовок
                ctx.fillStyle = '#FFFFFF';
                ctx.font = `bold ${fontSize}px 'Inter', sans-serif`;
                ctx.fillText(`🌲 ЛЕСОВИК • ФОТОФИКСАЦИЯ`, padding, canvas.height - (fontSize * (linesCount - 1) + padding / 2));

                // Геоданные
                const timestamp = new Date().toLocaleString('ru-RU');
                if (gps.lat === 'Нет сигнала') {
                    ctx.fillStyle = '#FCA5A5';
                    ctx.font = `bold ${fontSize * 0.85}px 'Inter', sans-serif`;
                    ctx.fillText(`Координаты: НЕТ СИГНАЛА GPS | Время: ${timestamp}`, padding, canvas.height - (fontSize * (linesCount - 2.1) + padding / 2));
                } else {
                    ctx.fillStyle = '#E2E8F0';
                    ctx.font = `${fontSize * 0.85}px 'Inter', sans-serif`;
                    ctx.fillText(`Координаты: СШ ${gps.lat}, ВД ${gps.lon} | Время: ${timestamp}`, padding, canvas.height - (fontSize * (linesCount - 2.1) + padding / 2));
                }

                // Примечание пользователя
                if (noteInput !== "") {
                    ctx.fillStyle = '#FEE2E2'; 
                    ctx.font = `italic 500 ${fontSize * 0.85}px 'Inter', sans-serif`;
                    ctx.fillText(`Объект: ${noteInput}`, padding, canvas.height - (fontSize * 0.6 + padding / 2));
                }

                // Вывод результата
                canvas.style.display = 'block';
                
                if (gps.lat === 'Нет сигнала') {
                    statusMessage.innerHTML = '⚠️ <b>Фото готово, но спутники не найдены.</b><br><small>Попробуйте подойти ближе к окну или выйти на улицу.</small>';
                } else {
                    statusMessage.innerText = '✅ Фотография успешно защищена штампом Лесовика';
                }
                
                // Подготовка ссылки для скачивания (с небольшим сжатием jpeg для скорости)
                downloadBtn.style.display = 'block';
                resetBtn.style.display = 'block';
                downloadBtn.href = canvas.toDataURL('image/jpeg', 0.85);
                downloadBtn.download = `lesovik_evidence_${Date.now()}.jpg`;

            } catch (error) {
                alert("Произошла ошибка при обработке фото: " + error.message);
                resetPhotoModule();
            }
        }

        // Очистка формы
        function resetPhotoModule() {
            document.getElementById('fullscreen-file-input').value = ""; 
            document.getElementById('watermark-canvas').style.display = 'none'; 
            document.getElementById('download-btn').style.display = 'none'; 
            document.getElementById('reset-btn').style.display = 'none'; 
            document.getElementById('status-message').style.display = 'none'; 
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
