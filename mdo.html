<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Экспресс-МДО Лесосек онлайн | Лесовик ПРО</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Inter:wght@400;500;600&display=swap');
        
        :root {
            --bg-paper: #F9FBF9;
            --text-graphite: #333333;
            --forest-green: #2D5A27;
            --border-color: #E0E0E0;
            --card-bg: #FFFFFF;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-paper);
            color: var(--text-graphite);
            margin: 0; padding: 20px;
            line-height: 1.6;
        }

        .container { max-width: 700px; margin: 0 auto; }
        
        h1 {
            font-family: 'Merriweather', serif;
            color: var(--forest-green);
            border-bottom: 2px solid var(--forest-green);
            padding-bottom: 10px;
        }

        .btn-back {
            display: inline-flex; align-items: center; gap: 8px;
            background: transparent; color: var(--forest-green);
            border: 1px solid var(--forest-green); padding: 8px 16px;
            border-radius: 8px; cursor: pointer; font-weight: 600;
            text-decoration: none; margin-bottom: 20px; transition: 0.2s;
        }
        .btn-back:hover { background: var(--forest-green); color: #fff; }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px; padding: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block; font-size: 12px; font-weight: 600;
            margin-bottom: 5px; text-transform: uppercase; color: var(--text-green);
        }
        .form-group input, .form-group select {
            width: 100%; padding: 12px; border: 1px solid var(--border-color);
            border-radius: 8px; box-sizing: border-box; background: var(--bg-paper);
        }

        .btn-calc {
            background-color: var(--forest-green); color: #fff;
            border: none; padding: 14px; width: 100%; border-radius: 8px;
            cursor: pointer; font-weight: 600; text-transform: uppercase; transition: 0.2s;
        }
        .btn-calc:hover { background-color: #1a3617; }

        .result-table {
            width: 100%; border-collapse: collapse; margin-top: 20px; display: none;
        }
        .result-table th, .result-table td {
            padding: 12px; border: 1px solid var(--border-color); text-align: left;
        }
        .result-table th { background-color: var(--forest-green); color: white; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="btn-back">← На главную Лесовика</a>
    <h1>Симулятор МДО Лесосек</h1>
    <p style="margin-bottom: 30px; opacity: 0.8;">Быстрое моделирование товарной структуры выдела (крупная, средняя, мелкая деловая древесина и дрова).</p>

    <div class="card">
        <div class="form-group">
            <label>Преобладающая порода</label>
            <select id="mdo-species">
                <option value="pine">Сосна / Ель (Хвойные)</option>
                <option value="birch">Береза / Осина (Мягколиственные)</option>
            </select>
        </div>
        <div class="form-group">
            <label>Площадь лесосеки (га)</label>
            <input type="number" id="mdo-space" value="1.0" step="0.1">
        </div>
        <div class="form-group">
            <label>Средний диаметр насаждения (см)</label>
            <input type="number" id="mdo-d" placeholder="Например: 24">
        </div>
        <div class="form-group">
            <label>Общий ликвидный запас на 1 га (м³)</label>
            <input type="number" id="mdo-stock" placeholder="Например: 220">
        </div>

        <button class="btn-calc" onclick="runMDO()">Выполнить оценку лесосеки</button>

        <table id="mdo-table-result" class="result-table">
            <thead>
                <tr>
                    <th>Сортимент / Категория</th>
                    <th>Процент (%)</th>
                    <th>Объем на лесосеке (м³)</th>
                </tr>
            </thead>
            <tbody id="mdo-tbody">
                <!-- Сюда JS вставит данные -->
            </tbody>
        </table>
    </div>
</div>

<script>
    function runMDO() {
        const species = document.getElementById('mdo-species').value;
        const space = parseFloat(document.getElementById('mdo-space').value);
        const d = parseInt(document.getElementById('mdo-d').value);
        const stock = parseFloat(document.getElementById('mdo-stock').value);
        const table = document.getElementById('mdo-table-result');
        const tbody = document.getElementById('mdo-tbody');

        if (!(space > 0 && d > 0 && stock > 0)) {
            alert("Заполните корректно все полевые параметры!");
            return;
        }

        const totalStock = stock * space;
        
        // Товарные коэффициенты распределения в зависимости от диаметра по лесохозяйственным стандартам
        let pLarge = 0, pMedium = 0, pSmall = 0, pFirewood = 15; // 15% сучья и отходы по умолчанию

        if (d <= 16) {
            pLarge = 0; pMedium = 15; pSmall = 55; pFirewood = 30;
        } else if (d > 16 && d <= 24) {
            pLarge = 15; pMedium = 45; pSmall = 25; pFirewood = 15;
        } else if (d > 24 && d <= 32) {
            pLarge = 45; pMedium = 35; pSmall = 10; pFirewood = 10;
        } else {
            pLarge = 65; pMedium = 20; pSmall = 5; pFirewood = 10;
        }

        // Если береза/осина — процент дров традиционно увеличивается из-за кривизны и гнили
        if (species === 'birch') {
            pFirewood += 10;
            let reduceFactor = 10 / (pLarge + pMedium + pSmall);
            pLarge -= pLarge * reduceFactor;
            pMedium -= pMedium * reduceFactor;
            pSmall -= pSmall * reduceFactor;
        }

        const vLarge = totalStock * (pLarge / 100);
        const vMedium = totalStock * (pMedium / 100);
        const vSmall = totalStock * (pSmall / 100);
        const vFirewood = totalStock * (pFirewood / 100);

        tbody.innerHTML = `
            <tr><td><b>Крупная товарная</b> (от 26 см)</td><td>${Math.round(pLarge)}%</td><td><b>${vLarge.toFixed(1)} м³</b></td></tr>
            <tr><td><b>Средняя товарная</b> (14-24 см)</td><td>${Math.round(pMedium)}%</td><td><b>${vMedium.toFixed(1)} м³</b></td></tr>
            <tr><td><b>Мелкая товарная</b> (6-12 см)</td><td>${Math.round(pSmall)}%</td><td><b>${vSmall.toFixed(1)} м³</b></td></tr>
            <tr><td><b>Дрова и отходы</b></td><td>${Math.round(pFirewood)}%</td><td><b>${vFirewood.toFixed(1)} м³</b></td></tr>
            <tr style="background:#e2eee2;"><td><b>ИТОГО ЛИКВИДНЫЙ ЗАПАС:</b></td><td>100%</td><td><b>${totalStock.toFixed(1)} м³</b></td></tr>
        `;
        
        table.style.display = 'table';
    }
</script>
</body>
</html>
